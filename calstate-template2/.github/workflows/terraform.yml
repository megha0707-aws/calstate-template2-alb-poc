name: Calstate Grouper ALB POC — Terraform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_stage2:
        description: "Run Stage 2 - Helm + App? (yes/no)"
        required: true
        default: "no"

permissions:
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  # ── Stage 1: Azure resources (subnet, ALB identity, ALB resource) ─────────
  # Runs automatically on every push to main
  stage1:
    name: "Stage 1 — Azure Infra"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply — Azure infra
        run: |
          terraform apply \
            -var-file="terraform.tfvars" \
            -target=azurerm_subnet.alb \
            -target=azurerm_user_assigned_identity.alb \
            -target=azurerm_federated_identity_credential.alb \
            -target=azapi_resource.alb \
            -target=azapi_resource.alb_association \
            -auto-approve \
            -input=false

  # ── Stage 2: Helm + App — run manually AFTER setup.sh completes ───────────
  # Trigger: Actions → Run workflow → type yes
  stage2:
    name: "Stage 2 — Helm + App"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_stage2 == 'yes'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply — Helm + App
        run: |
          terraform apply \
            -var-file="terraform.tfvars" \
            -target=helm_release.alb_controller \
            -target=kubernetes_namespace.app \
            -target=kubernetes_deployment.nginx \
            -target=kubernetes_service.nginx \
            -auto-approve \
            -input=false

      - name: Wait for ALB controller CRDs
        run: sleep 60

      - name: Terraform Apply — Gateway + HTTPRoute
        run: |
          terraform apply \
            -var-file="terraform.tfvars" \
            -target=kubernetes_manifest.gateway \
            -target=kubernetes_manifest.httproute \
            -auto-approve \
            -input=false
